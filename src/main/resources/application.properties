spring.application.name=quote-remittance-backend
app.version=@project.version@

spring.datasource.url=jdbc:postgresql://127.0.0.1:${DB_PORT:5432}/remittance
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Webhook Security Secret
remittance.webhook.secret=${REMITTANCE_WEBHOOK_SECRET:sk_test_4c5238d32169cff6a2d243f8f58d1c59ac6af069}

# Paystack Integration
paystack.api.url=https://api.paystack.co
paystack.api.secret=${PAYSTACK_API_SECRET:sk_test_4c5238d32169cff6a2d243f8f58d1c59ac6af069}

quote.expiry-minutes=3
quote.fee-percentage=0.015

jwt.secret=${JWT_SECRET:local_dev_secret_key_at_least_32_characters_long}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Exchange Rate
exchange.api.key=${EXCHANGE_API_KEY}
exchange.api.url=${EXCHANGE_API_URL:https://v6.exchangerate-api.com/v6}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://sustainer-contort-penalty.ngrok-free.dev}

# Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
