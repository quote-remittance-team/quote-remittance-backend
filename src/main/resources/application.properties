spring.application.name=quote-remittance-backend

spring.datasource.url=jdbc:postgresql://127.0.0.1:${DB_PORT:5432}/remittance
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Webhook Security Secret
remittance.webhook.secret=${REMITTANCE_WEBHOOK_SECRET}

# Paystack Integration
paystack.api.url=https://api.paystack.co
paystack.api.secret=${PAYSTACK_API_SECRET}

quote.expiry-minutes=3
quote.fee-percentage=0.015

jwt.secret=${JWT_SECRET:default_secret_key_at_least_256_bits_long}
jwt.expiration=${JWT_EXPIRATION:3600000}

#Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

#remove the comment tag for testing
#spring.flyway.location=classpath:db/migration,classpath:db/seed

# Exchange rate
exchange.api.key=${EXCHANGE_API_KEY}
exchange.api.url=${EXCHANGE_API_URL}

# CORS
cors.allowed-origins=http://localhost:5173,https://your-website.com
