spring.application.name=quote-remittance-backend

spring.datasource.url=jdbc:postgresql://127.0.0.1:${DB_PORT:5432}/remittance
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Webhook Security Secret
remittance.webhook.secret=${REMITTANCE_WEBHOOK_SECRET}

# Paystack Integration
paystack.api.url=https://api.paystack.co
paystack.api.secret=${PAYSTACK_API_SECRET}

quote.expiry-minutes=15
quote.fee-percentage=0.015
