

services:
  postgres:
    image: postgres:15
    container_name: remittance-db
    restart: always
    environment:
      POSTGRES_DB: remittance
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: